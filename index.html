<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Мой архив</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;0,800;1,500&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#100E0C;--bg-2:#15110D;--surface:#191512;--surface-2:#211B16;
    --line:#2E281F;--line-soft:#241F19;--text:#F1E8D9;--text-2:#CABCA7;--muted:#8A7B66;
    --accent:#D89A4E;--accent-d:#C2843A;--gold:#E6B85A;--sage:#A2AD6E;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    background:
      radial-gradient(900px 480px at 50% -6%, #3a2c17 0%, transparent 58%),
      radial-gradient(700px 500px at 88% 8%, #2a2113 0%, transparent 55%),
      var(--bg);
    color:var(--text);font-family:"Manrope",system-ui,sans-serif;line-height:1.55;min-height:100vh;-webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:720px;margin:0 auto;padding:38px 18px 100px}
  header{margin-bottom:8px}
  .kicker{font-size:11px;letter-spacing:.34em;text-transform:uppercase;color:var(--accent);opacity:.8;margin-bottom:11px}
  .title{font-family:"Playfair Display",serif;font-weight:800;font-size:clamp(40px,11vw,68px);line-height:.95;letter-spacing:-.01em;cursor:text;outline:none;border-radius:6px;background:linear-gradient(180deg,#fff 10%,#D89A4E 150%);-webkit-background-clip:text;background-clip:text;color:transparent}
  .title:focus,.subtitle:focus{box-shadow:0 0 0 2px var(--accent)}
  .subtitle{font-family:"Playfair Display",serif;font-style:italic;color:var(--text-2);margin-top:10px;font-size:18px;cursor:text;outline:none;border-radius:6px;max-width:560px}

  nav{display:flex;gap:8px;margin:28px 0 22px;flex-wrap:wrap}
  .tab{appearance:none;border:1px solid var(--line);background:var(--surface);color:var(--text-2);font-family:"Manrope";font-weight:600;font-size:14px;padding:9px 18px;border-radius:999px;cursor:pointer;transition:.18s}
  .tab:hover{border-color:var(--accent);color:var(--text)}
  .tab.active{background:var(--accent);border-color:var(--accent);color:#1a1308;box-shadow:0 0 26px #d89a4e44}

  .composer{background:linear-gradient(180deg,var(--surface),var(--bg-2));border:1px solid var(--line);border-radius:18px;padding:18px;margin-bottom:26px}
  .composer h3{font-family:"Playfair Display",serif;font-weight:700;font-size:18px;margin-bottom:15px}
  .row{display:flex;gap:12px;flex-wrap:wrap}
  .field{flex:1;min-width:140px;margin-bottom:11px}
  label{display:block;font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
  input,textarea{width:100%;background:#0E0B09;border:1px solid var(--line);border-radius:11px;color:var(--text);font-family:"Manrope";font-size:15px;padding:11px 13px;transition:.15s}
  textarea{resize:vertical;min-height:60px}
  input:focus,textarea:focus{outline:none;border-color:var(--accent);background:#120E0B}
  input::placeholder,textarea::placeholder{color:#6a5d4c}
  .pick{display:flex;align-items:center;gap:14px}
  .pick .drop{width:64px;height:92px;border-radius:9px;border:1.5px dashed var(--line);background:#0E0B09;display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;flex-shrink:0;transition:.15s;color:var(--muted);font-size:22px}
  .pick .drop:hover{border-color:var(--accent);color:var(--accent)}
  .pick .drop img{width:100%;height:100%;object-fit:cover}
  .pick .hint{font-size:13px;color:var(--muted)}
  .pick .hint b{color:var(--text-2);font-weight:600;display:block;font-size:13.5px;margin-bottom:2px}
  .composer-foot{display:flex;justify-content:flex-end;margin-top:6px}
  .btn{appearance:none;border:none;cursor:pointer;font-family:"Manrope";font-weight:700;font-size:14px;padding:11px 22px;border-radius:11px;color:#1a1308;background:var(--accent);transition:.15s}
  .btn:hover{background:var(--accent-d);transform:translateY(-1px)}

  /* compact cards */
  .feed{display:flex;flex-direction:column}
  .card{display:flex;gap:15px;padding:17px 0;border-bottom:1px solid var(--line-soft);position:relative;cursor:pointer;transition:.15s}
  .card:last-child{border-bottom:none}
  .card:hover{background:#17120e}
  .card:hover .thumb{box-shadow:0 6px 20px #00000077,0 0 0 1px var(--accent)}
  .thumb{width:92px;min-width:92px;height:138px;border-radius:10px;object-fit:cover;background:linear-gradient(160deg,#241d15,#191512);box-shadow:0 5px 16px #00000055,0 0 0 1px var(--line);transition:.18s}
  .thumb-e{width:92px;min-width:92px;height:138px;border-radius:10px;background:linear-gradient(150deg,#241d15,#191512);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-family:"Playfair Display",serif;font-size:38px;color:#d89a4e3a;font-weight:800}
  .body{flex:1;min-width:0;padding-right:8px}
  .chead{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
  .ttl{font-family:"Playfair Display",serif;font-weight:700;font-size:20px;line-height:1.15}
  .sub{color:var(--text-2);font-size:13.5px;margin-top:3px}
  .info{color:var(--muted);font-size:13px;margin-top:3px}
  .note{margin-top:9px;font-size:14px;color:var(--text-2);display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
  .more{margin-top:9px;font-size:11.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);opacity:.75}
  .chips{display:flex;gap:8px;margin-top:11px;flex-wrap:wrap}
  .chip{text-decoration:none;font-size:12.5px;font-weight:600;padding:7px 13px;border-radius:9px;border:1px solid var(--line);color:var(--accent);background:var(--surface);transition:.15s}
  .chip:hover{border-color:var(--accent);background:#1f1813}
  .rsmall{font-family:"Playfair Display",serif;font-weight:800;font-size:21px;line-height:1;flex-shrink:0}
  .rsmall.hi{color:var(--gold)} .rsmall.mid{color:var(--sage)} .rsmall.low{color:var(--muted)}
  .del{position:absolute;top:14px;right:0;background:#0a0807cc;border:1px solid var(--line);color:#cabca7;cursor:pointer;font-size:15px;line-height:1;padding:4px 9px;border-radius:8px;transition:.15s;z-index:2}
  .del:hover{color:#fff;border-color:var(--accent);background:#1f1813cc}
  .empty{text-align:center;color:var(--muted);padding:50px 20px;border:1px dashed var(--line);border-radius:16px}
  .empty .big{font-family:"Playfair Display",serif;font-size:44px;margin-bottom:6px;opacity:.5}

  /* detail lightbox */
  #lb{position:fixed;inset:0;background:#080605f5;display:none;z-index:50;padding:28px 18px;overflow-y:auto;backdrop-filter:blur(7px)}
  #lb.on{display:block}
  .lb-card{max-width:520px;margin:10px auto;display:flex;flex-direction:column;align-items:center;text-align:center}
  #lb img{max-width:300px;width:100%;border-radius:14px;box-shadow:0 20px 60px #000;margin-bottom:20px}
  .lbttl{font-family:"Playfair Display",serif;font-size:27px;font-weight:700;line-height:1.1}
  .lbmeta{color:var(--muted);font-size:14px;margin-top:8px}
  .lbmeta b{font-family:"Playfair Display",serif}
  .lbsec{margin-top:22px;text-align:left;width:100%}
  .lbh{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);margin-bottom:7px}
  .lbtext{color:var(--text-2);font-size:15.5px;line-height:1.6;white-space:pre-wrap}
  #lb .x{position:fixed;top:16px;right:20px;color:#cabca7;font-size:32px;cursor:pointer;line-height:1;z-index:51}
  #lb .lbchips{display:flex;gap:9px;margin-top:20px;flex-wrap:wrap;justify-content:center}

  .hidden{display:none}
  .view .composer,.view .del{display:none!important}
  .loading{text-align:center;color:var(--muted);padding:40px}
  footer{margin-top:46px;text-align:center;color:#6a5d4c;font-size:12px;letter-spacing:.05em}
  @media(max-width:480px){.thumb,.thumb-e{width:78px;min-width:78px;height:116px}.ttl{font-size:18px}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1 class="title" id="title" contenteditable="true" spellcheck="false">Мой архив</h1>
    <p class="subtitle" id="subtitle" contenteditable="true" spellcheck="false">то, что я смотрю, слушаю и читаю</p>
  </header>
  <nav>
    <button class="tab active" data-tab="films">Фильмы</button>
    <button class="tab" data-tab="music">Музыка</button>
    <button class="tab" data-tab="books">Книги</button>
  </nav>
  <div id="loader" class="loading">Загружаю архив…</div>
  <main id="app" class="hidden">
    <section id="films" class="pane">
      <div class="composer">
        <h3>Добавить фильм</h3>
        <div class="pick"><div class="drop" id="f-drop">＋</div><input type="file" id="f-file" accept="image/*" class="hidden"><div class="hint"><b>Постер фильма</b>Нажми, чтобы загрузить</div></div>
        <div class="row" style="margin-top:12px">
          <div class="field" style="flex:3"><label>Название</label><input id="f-title" placeholder="1+1"></div>
          <div class="field" style="flex:1"><label>Год</label><input id="f-year" placeholder="2011" inputmode="numeric"></div>
          <div class="field" style="flex:1"><label>Оценка / 10</label><input id="f-rate" type="number" min="0" max="10" step="0.1" placeholder="8.9"></div>
        </div>
        <div class="field"><label>Страна · жанр · режиссёр</label><input id="f-info" placeholder="Франция • драма • Оливье Накаш"></div>
        <div class="field"><label>О чём (краткое описание)</label><textarea id="f-plot" placeholder="В двух словах про что фильм"></textarea></div>
        <div class="field"><label>Моё мнение</label><textarea id="f-note" placeholder="Что зацепило?"></textarea></div>
        <div class="composer-foot"><button class="btn" id="f-add">Добавить</button></div>
      </div>
      <div class="feed" id="films-feed"></div>
    </section>
    <section id="music" class="pane hidden">
      <div class="composer">
        <h3>Добавить трек</h3>
        <div class="pick"><div class="drop" id="m-drop">＋</div><input type="file" id="m-file" accept="image/*" class="hidden"><div class="hint"><b>Обложка</b>Нажми, чтобы загрузить</div></div>
        <div class="row" style="margin-top:12px">
          <div class="field" style="flex:2"><label>Название</label><input id="m-title" placeholder="Название трека"></div>
          <div class="field" style="flex:2"><label>Исполнитель</label><input id="m-artist" placeholder="Кто исполняет"></div>
          <div class="field" style="flex:1"><label>Оценка / 10</label><input id="m-rate" type="number" min="0" max="10" step="0.1" placeholder="9.0"></div>
        </div>
        <div class="row">
          <div class="field"><label>Ссылка послушать</label><input id="m-listen" placeholder="https://…"></div>
          <div class="field"><label>Ссылка скачать</label><input id="m-download" placeholder="https://…"></div>
        </div>
        <div class="composer-foot"><button class="btn" id="m-add">Добавить</button></div>
      </div>
      <div class="feed" id="music-feed"></div>
    </section>
    <section id="books" class="pane hidden">
      <div class="composer">
        <h3>Добавить книгу</h3>
        <div class="pick"><div class="drop" id="b-drop">＋</div><input type="file" id="b-file" accept="image/*" class="hidden"><div class="hint"><b>Обложка книги</b>Нажми, чтобы загрузить</div></div>
        <div class="row" style="margin-top:12px">
          <div class="field" style="flex:3"><label>Название</label><input id="b-title" placeholder="Название книги"></div>
          <div class="field" style="flex:1"><label>Год</label><input id="b-year" placeholder="1967" inputmode="numeric"></div>
          <div class="field" style="flex:1"><label>Оценка / 10</label><input id="b-rate" type="number" min="0" max="10" step="0.1" placeholder="8.5"></div>
        </div>
        <div class="field"><label>Автор · жанр</label><input id="b-info" placeholder="Михаил Булгаков • роман"></div>
        <div class="field"><label>О чём</label><textarea id="b-plot" placeholder="Краткое описание"></textarea></div>
        <div class="field"><label>Моё мнение</label><textarea id="b-note" placeholder="Впечатления"></textarea></div>
        <div class="field"><label>Ссылка читать / скачать</label><input id="b-link" placeholder="https://…"></div>
        <div class="composer-foot"><button class="btn" id="b-add">Добавить</button></div>
      </div>
      <div class="feed" id="books-feed"></div>
    </section>
  </main>
  <footer></footer>
</div>

<div id="lb"><span class="x">×</span><div class="lb-card">
  <div id="lb-videos" style="width:100%;display:none"></div>
  <img id="lb-img" src="" alt="">
  <div class="lbttl" id="lb-ttl"></div>
  <div class="lbmeta" id="lb-meta"></div>
  <div class="lbsec hidden" id="lb-plot-s"><div class="lbh">О чём</div><div class="lbtext" id="lb-plot"></div></div>
  <div class="lbsec hidden" id="lb-note-s"><div class="lbh">Моё мнение</div><div class="lbtext" id="lb-note"></div></div>
  <div class="lbchips" id="lb-chips"></div>
</div></div>

const PLOTS_LIST=[
 {t:"Из 13 в 30",p:"Девчонка в 13 загадывает стать сразу взрослой — и просыпается уже 30-летней тёткой с карьерой мечты. Только понимает, что по пути растеряла самое важное."},
 {t:"500 дней лета",p:"Парень по уши влюбляется в девушку, которая в отношения не верит от слова совсем. Не история любви — история про любовь. Без дефолтного хэппи-энда."},
 {t:"Хорошо быть тихоней",p:"Замкнутый новенький в школе прибивается к компании старшаков и наконец находит своих. Про дружбу, первую любовь и то, как тяжело бывает внутри."},
 {t:"Бойцовский клуб",p:"Офисный задрот от бессонницы и скуки замутил подпольный клуб мордобоя с харизматичным незнакомцем. А потом — поворот, который ломает башку напрочь."},
 {t:"Мистер и миссис Смит",p:"Обычная семейная пара, а по факту оба — наёмные убийцы, и ни один не в курсе про другого. Пока им не падает заказ устранить... друг друга."},
 {t:"Знакомьтесь, Джо Блэк",p:"Сама Смерть берёт паузу, вселяется в тело молодого парня и приходит за богатым дедом. А заодно влипает в чувства к его дочке."},
 {t:"Шерлок",p:"Гениальный детектив-социопат и его сосед-доктор раскрывают дела в современном Лондоне. Шерлок — машина, но с приколами и душой."},
 {t:"Пираты Карибского моря",p:"Чумовой пьяница-пират Джек Воробей, проклятое золото и тонна приключений на море. Чистая свобода, ром и романтика старых времён."},
 {t:"Человек-паук",p:"Парень с паучьими суперсилами спасает город и параллельно пытается жить как нормальный человек. (А в финале три Питера в одном кадре — мурашки.)"},
 {t:"Страх",p:"Милый парень оказывается одержимым психопатом. Триллер про то, как первая любовь превращается в полный кошмар."},
 {t:"Вейн",p:"Суровый пацан со своим кодексом чести и его девчонка едут через всю Америку разруливать дела. Жёстко, странно, но со своим вайбом."},
 {t:"Середина 90-х",p:"Пацан из 90-х прибивается к скейтерам и взрослеет на улицах ЛА. Сплошной вайб лета, свободы и первых косяков."},
 {t:"Мистер Робот",p:"Хакер-кибербезопасник с расшатанной психикой втягивается в заговор по сносу корпораций. Башка кругом от поворотов."},
 {t:"Просто добавь воды",p:"Три девчонки случайно превращаются в русалок и шифруются от всех. Подростковый сериал с летним австралийским вайбом."},
 {t:"Дневник баскетболиста",p:"Талантливый баскетболист скатывается в наркоту и теряет вообще всё. Жёсткая история о том, как легко слить свой талант."},
 {t:"Титаник",p:"Бедный художник и богатая девушка влюбляются на корабле, который весь мир уже знает чем закончит. Слёзы по дефолту."},
 {t:"Останься",p:"Психиатр пытается спасти пациента от суицида, а реальность вокруг начинает плыть и рассыпаться. К финалу всё встаёт на свои места (депрессивный вайб)."},
 {t:"Мост в Терабитию",p:"Двое детей выдумывают целый волшебный мир, чтобы прятаться от паршивой реальности. Про дружбу, которая бьёт прямо в сердце."},
 {t:"Круэлла",p:"История о том, как дерзкая модница с улиц превратилась в легендарную злодейку Круэллу. Стиль, панк-рок и месть."},
 {t:"Папе снова 17",p:"Мужик в полном кризисе магически снова становится 17-летним и идёт в школу к собственным детям. Понимает, что важно по-настоящему."},
 {t:"Один дома",p:"Пацана случайно забыли дома одного на Рождество, и он в одиночку выносит двух грабителей-неудачников. Новогодняя классика на все времена."},
 {t:"Гарри Поттер",p:"Обычный мальчик узнаёт, что он волшебник, и едет учиться в Хогвартс. Дальше — 7 лет магии, дружбы и битвы со злом. Мечта — попасть туда вживую."},
 {t:"Волк с Уолл-стрит",p:"Брокер сколачивает дикое состояние на разводах и тонет в деньгах, наркоте и беспределе. По реальной истории, кстати."},
 {t:"Проект Х",p:"Подростки замутили домашнюю вечеринку, которая вышла из-под контроля совсем уж в хлам. Чистый американский хаос и угар."},
 {t:"Оно",p:"Компашка детей-аутсайдеров сражается с клоуном-чудовищем, который кормится их страхами. Лучший ужастик по моему мнению."},
 {t:"Дом странных детей",p:"Парень попадает в дом, где живут дети со суперспособностями, застрявшие в одном дне. Тёмная сказка в стиле Бёртона."},
 {t:"Чарли и шоколадная фабрика",p:"Бедный мальчик выигрывает золотой билет на экскурсию по безумной шоколадной фабрике странного гения. Сладко и слегка жутко."},
 {t:"Холоп",p:"Зажравшегося мажора помещают в фейковую деревню 19 века, чтобы по-жёсткому перевоспитать. Реально вывозит, без кринжа."},
 {t:"Карате-пацан",p:"Пацан переезжает с мамой в Китай, попадает под буллинг, и местный мастер на все руки учит его кунг-фу через бытовуху. Классика про становление характера."},
 {t:"Лунатизм",p:"Парень с непростой жизнью берёт на себя племянницу, когда её мать сваливает. Тягучая драма про семью, которой реально не повезло."}
];

const posterFor=x=>x.img||POSTERS[norm(x.title)]||null;
const videoFor=x=>{if(x.video)return[x.video];const v=VIDEOS[norm(x.title)];return v?(Array.isArray(v)?v:[v]):[];};
const plotFor=x=>x.plot||PLOTM[norm(x.title)]||"";

async function save(){try{localStorage.setItem(KEY,JSON.stringify(data));}catch(e){alert("Не удалось сохранить (возможно фото слишком большое).");console.error(e);}}
async function load(){try{const r=localStorage.getItem(KEY);if(r)data=JSON.parse(r);}catch(e){}}

function resizeImage(file,maxW=300){return new Promise((res,rej)=>{const fr=new FileReader();fr.onload=()=>{const img=new Image();img.onload=()=>{const sc=Math.min(1,maxW/img.width),w=Math.round(img.width*sc),h=Math.round(img.height*sc);const c=document.createElement("canvas");c.width=w;c.height=h;c.getContext("2d").drawImage(img,0,0,w,h);res(c.toDataURL("image/jpeg",0.72));};img.onerror=rej;img.src=fr.result;};fr.onerror=rej;fr.readAsDataURL(file);});}
function bindPicker(cat,dropId,fileId){const drop=$(dropId),file=$(fileId);drop.addEventListener("click",()=>file.click());file.addEventListener("change",async()=>{const f=file.files[0];if(!f)return;try{const d=await resizeImage(f);pending[cat]=d;drop.innerHTML='<img src="'+d+'" alt="">';}catch(e){alert("Не получилось обработать фото");}});}
function resetPicker(cat,dropId){pending[cat]=null;$(dropId).innerHTML="＋";}

function rCls(v){return v>=7?"hi":v>=5?"mid":"low";}
function ratingSmall(r){if(r===""||r===null||r===undefined||isNaN(r))return "";const v=parseFloat(r);return '<div class="rsmall '+rCls(v)+'">'+v.toFixed(1)+'</div>';}
function thumbHtml(x){const img=posterFor(x);return img?'<img class="thumb" src="'+img+'" alt="">':'<div class="thumb-e">'+esc((x.title||"?").charAt(0).toUpperCase())+'</div>';}

function cardHtml(cat,x,subLine,chips){
  return '<div class="card" data-open="'+cat+':'+x.id+'">'+
    '<button class="del" data-del="'+cat+'" data-id="'+x.id+'">×</button>'+
    thumbHtml(x)+
    '<div class="body"><div class="chead"><div class="ttl">'+esc(x.title)+'</div>'+ratingSmall(x.rate)+'</div>'+
    (subLine?'<div class="sub">'+subLine+'</div>':"")+
    (x.info?'<div class="info">'+esc(x.info)+'</div>':"")+
    (x.note?'<div class="note">'+esc(x.note)+'</div>':"")+
    (chips||"")+
    '</div></div>';
}
function renderFilms(){const f=$("#films-feed");if(!data.films.length){f.innerHTML=empty("🎬","Пока ни одного фильма","Добавь фильм — постер, оценка, описание.");return;}
  f.innerHTML=data.films.map(x=>cardHtml("films",x,x.year?esc(x.year):"","")).join("");}
function renderMusic(){const f=$("#music-feed");if(!data.music.length){f.innerHTML=empty("🎵","Тишина","Добавь трек со ссылкой.");return;}
  f.innerHTML=data.music.map(x=>{const l=safeUrl(x.listen),d=safeUrl(x.download);const chips='<div class="chips">'+(l?'<a class="chip" href="'+l+'" target="_blank" rel="noopener" data-link>▶ Слушать</a>':"")+(d?'<a class="chip" href="'+d+'" target="_blank" rel="noopener" download data-link>↓ Скачать</a>':"")+'</div>';return cardHtml("music",x,x.artist?esc(x.artist):"",chips);}).join("");}
function renderBooks(){const f=$("#books-feed");if(!data.books.length){f.innerHTML=empty("📖","Полка пуста","Добавь книгу с обложкой и оценкой.");return;}
  f.innerHTML=data.books.map(x=>{const lk=safeUrl(x.link);const chips=lk?'<div class="chips"><a class="chip" href="'+lk+'" target="_blank" rel="noopener" data-link>↓ Читать / скачать</a></div>':"";return cardHtml("books",x,x.year?esc(x.year):"",chips);}).join("");}
function empty(b,t,s){return '<div class="empty"><div class="big">'+b+'</div><strong>'+t+'</strong><br><span style="font-size:14px">'+s+'</span></div>';}
function renderAll(){renderFilms();renderMusic();renderBooks();}

function openDetail(cat,id){
  const x=(data[cat]||[]).find(i=>i.id===id);if(!x)return;
  const vids=videoFor(x), img=posterFor(x);
  const vc=$("#lb-videos");vc.innerHTML="";
  if(vids.length){vids.forEach(src=>{const v=document.createElement("video");v.controls=true;v.playsInline=true;v.preload="metadata";v.src=src;v.style.cssText="width:100%;max-width:380px;border-radius:14px;box-shadow:0 20px 60px #000;margin-bottom:14px;display:block;margin-left:auto;margin-right:auto";vc.appendChild(v);});vc.style.display="";$("#lb-img").style.display="none";}
  else{vc.style.display="none";if(img){$("#lb-img").src=img;$("#lb-img").style.display="";}else{$("#lb-img").style.display="none";}}
  $("#lb-ttl").textContent=x.title;
  let meta=[];if(cat==="music"&&x.artist)meta.push(esc(x.artist));if(x.year)meta.push(esc(x.year));if(x.info)meta.push(esc(x.info));
  let mh=meta.join(" • ");if(x.rate!==""&&x.rate!=null&&!isNaN(x.rate))mh+=(mh?"  ":"")+'<b class="'+rCls(parseFloat(x.rate))+'" style="color:var(--gold)">★ '+parseFloat(x.rate).toFixed(1)+'/10</b>';
  $("#lb-meta").innerHTML=mh;
  const plot=plotFor(x);
  if(plot){$("#lb-plot").textContent=plot;$("#lb-plot-s").classList.remove("hidden");}else{$("#lb-plot-s").classList.add("hidden");}
  if(x.note){$("#lb-note").textContent=x.note;$("#lb-note-s").classList.remove("hidden");}else{$("#lb-note-s").classList.add("hidden");}
  let chips="";const l=safeUrl(x.listen),d=safeUrl(x.download),lk=safeUrl(x.link);
  if(l)chips+='<a class="chip" href="'+l+'" target="_blank" rel="noopener">▶ Слушать</a>';
  if(d)chips+='<a class="chip" href="'+d+'" target="_blank" rel="noopener" download>↓ Скачать</a>';
  if(lk)chips+='<a class="chip" href="'+lk+'" target="_blank" rel="noopener">↓ Читать / скачать</a>';
  $("#lb-chips").innerHTML=chips;
  $("#lb").classList.add("on");
}

document.addEventListener("click",async e=>{
  const del=e.target.closest("[data-del]");
  if(del){e.stopPropagation();const cat=del.dataset.del;data[cat]=data[cat].filter(x=>x.id!==del.dataset.id);renderAll();await save();return;}
  if(e.target.closest("[data-link]"))return;
  const card=e.target.closest("[data-open]");
  if(card){const[cat,id]=card.dataset.open.split(":");openDetail(cat,id);}
});
function closeLb(){$("#lb-videos").querySelectorAll("video").forEach(v=>{try{v.pause();}catch(e){}});$("#lb").classList.remove("on");}
$("#lb").addEventListener("click",e=>{if(e.target.closest(".lbchips a"))return;closeLb();});
document.addEventListener("keydown",e=>{if(e.key==="Escape")closeLb();});

function bindEditable(el,field,def){el.dataset.def=def;el.addEventListener("blur",async()=>{data.meta[field]=el.textContent.trim()||def;el.textContent=data.meta[field];await save();});el.addEventListener("keydown",ev=>{if(ev.key==="Enter"){ev.preventDefault();el.blur();}});}

function migrate(){let changed=false;
  if(!data.meta.seeded){const have=new Set(data.films.map(f=>norm(f.title)));
    for(let i=SEED.length-1;i>=0;i--){const s=SEED[i];if(have.has(norm(s.title)))continue;data.films.unshift({id:uid(),title:s.title,year:s.year,rate:s.rate,info:s.info,note:s.note,img:null,ts:Date.now()-i});}
    data.meta.seeded=true;changed=true;}
  if(!data.meta.descV4){data.meta.title="Мой архив";data.meta.subtitle="залетай 🤍 тут всё, что я смотрел, слушал и читал. оценки честные, мысли по вайбу — что-то точно зайдёт и тебе.";data.meta.descV4=true;changed=true;}
  if(!data.meta.notesV4){data.films.forEach(f=>{const n=NOTEM[norm(f.title)];if(n)f.note=n;});data.meta.notesV4=true;changed=true;}
  if(!data.meta.addV1){
    const have=new Set(data.films.map(f=>norm(f.title)));
    const extra=[
      {title:"Карате-пацан",year:"2010",rate:7,info:"",note:"аура"},
      {title:"Лунатизм",year:"2008",rate:5,info:"",note:"Прикольная история."}
    ];
    extra.forEach(s=>{if(!have.has(norm(s.title)))data.films.push({id:uid(),title:s.title,year:s.year,rate:s.rate,info:s.info,note:s.note,img:null,ts:Date.now()});});
    data.meta.addV1=true;changed=true;
  }
  if(!data.meta.addV2){
    const have=new Set(data.films.map(f=>norm(f.title)));
    const extra=[
      {title:"Социальная сеть",year:"2010",rate:7,info:"",note:""},
      {title:"Унесённые призраками",year:"2001",rate:6,info:"",note:""}
    ];
    extra.forEach(s=>{if(!have.has(norm(s.title)))data.films.push({id:uid(),title:s.title,year:s.year,rate:s.rate,info:s.info,note:s.note,img:null,ts:Date.now()});});
    data.meta.addV2=true;changed=true;
  }
  return changed;}

(async function init(){
  const params=new URLSearchParams(location.search);
  if(params.has("edit"))localStorage.setItem("arch_owner","1");
  if(params.has("noedit"))localStorage.removeItem("arch_owner");
  const EDIT=localStorage.getItem("arch_owner")==="1";
  await load();
  if(migrate())await save();
  $("#title").textContent=data.meta.title;$("#subtitle").textContent=data.meta.subtitle;
  if(EDIT){
    bindEditable($("#title"),"title","Мой архив");bindEditable($("#subtitle"),"subtitle","то, что я смотрю, слушаю и читаю");
    bindPicker("films","#f-drop","#f-file");bindPicker("music","#m-drop","#m-file");bindPicker("books","#b-drop","#b-file");
  }else{
    document.body.classList.add("view");
    $("#title").removeAttribute("contenteditable");$("#subtitle").removeAttribute("contenteditable");
  }
  renderAll();
  $("#loader").classList.add("hidden");$("#app").classList.remove("hidden");
})();
