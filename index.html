<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Мой архив</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#17110d; --surface:#221913; --surface2:#2c2018; --border:#3a2b20;
    --text:#ece0cf; --muted:#a3917c; --accent:#c08a4e; --accent-soft:#d9a86a;
    --gold:#e0b15f; --danger:#b5654a;
    --display:'Cormorant Garamond',Georgia,serif;
    --body:'Inter',system-ui,-apple-system,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:
      radial-gradient(1200px 600px at 80% -10%, #2a1d12 0%, transparent 60%),
      var(--bg);
    color:var(--text); font-family:var(--body); line-height:1.55;
    min-height:100vh; -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:1080px; margin:0 auto; padding:clamp(20px,5vw,56px) clamp(16px,4vw,32px) 80px}

  /* Header */
  header{margin-bottom:34px}
  .eyebrow{font-size:12px; letter-spacing:.32em; text-transform:uppercase; color:var(--accent); margin:0 0 6px}
  .title{
    font-family:var(--display); font-weight:600; font-size:clamp(40px,8vw,72px);
    line-height:.98; margin:0; letter-spacing:.5px;
  }
  .title:focus,.subtitle:focus{outline:1px dashed var(--border); outline-offset:6px; border-radius:4px}
  .subtitle{font-family:var(--display); font-style:italic; font-size:clamp(17px,3vw,22px); color:var(--muted); margin:8px 0 0; max-width:60ch}
  [contenteditable="true"]{cursor:text}

  /* Owner bar */
  .ownerbar{display:flex; align-items:center; gap:10px; margin-top:18px; flex-wrap:wrap}
  .lock{
    display:inline-flex; align-items:center; gap:8px; background:var(--surface);
    border:1px solid var(--border); color:var(--muted); padding:8px 14px;
    border-radius:999px; cursor:pointer; font-size:13px; font-family:var(--body);
    transition:.15s;
  }
  .lock:hover{border-color:var(--accent); color:var(--text)}
  .lock.on{color:var(--accent-soft); border-color:var(--accent)}
  .hint{font-size:12.5px; color:var(--muted)}

  /* Tabs */
  nav.tabs{display:flex; gap:4px; margin:30px 0 26px; border-bottom:1px solid var(--border)}
  .tab{
    appearance:none; background:none; border:none; color:var(--muted);
    font-family:var(--display); font-size:23px; padding:10px 18px 14px;
    cursor:pointer; position:relative; transition:.15s; letter-spacing:.3px;
  }
  .tab:hover{color:var(--text)}
  .tab.active{color:var(--text)}
  .tab.active::after{
    content:""; position:absolute; left:18px; right:18px; bottom:-1px; height:2px;
    background:linear-gradient(90deg,var(--accent),var(--accent-soft)); border-radius:2px;
  }

  /* Add form */
  .panel{
    background:var(--surface); border:1px solid var(--border); border-radius:16px;
    padding:20px; margin-bottom:30px;
  }
  .panel h3{font-family:var(--display); font-size:22px; margin:0 0 14px; font-weight:600}
  .grid{display:grid; gap:12px; grid-template-columns:repeat(auto-fit,minmax(180px,1fr))}
  label{display:block; font-size:12px; color:var(--muted); margin:0 0 5px; letter-spacing:.04em}
  input[type=text],input[type=number],input[type=url],textarea,select{
    width:100%; background:var(--surface2); border:1px solid var(--border); color:var(--text);
    border-radius:10px; padding:10px 12px; font-family:var(--body); font-size:14px;
  }
  textarea{resize:vertical; min-height:64px}
  input:focus,textarea:focus,select:focus{outline:none; border-color:var(--accent)}
  input[type=file]{font-size:12.5px; color:var(--muted)}
  .full{grid-column:1/-1}
  .btn{
    appearance:none; border:none; cursor:pointer; font-family:var(--body); font-weight:600;
    font-size:14px; padding:11px 20px; border-radius:10px; transition:.15s;
    background:linear-gradient(135deg,var(--accent),var(--accent-soft)); color:#1a120b;
  }
  .btn:hover{filter:brightness(1.06)}
  .btn.ghost{background:none; border:1px solid var(--border); color:var(--muted)}
  .btn.ghost:hover{border-color:var(--accent); color:var(--text)}
  .btn.sm{padding:7px 13px; font-size:12.5px; font-weight:500}
  .btn.danger{background:none; border:1px solid #4a2b22; color:var(--danger)}
  .btn.danger:hover{background:#2a1814}
  .formActions{display:flex; gap:10px; margin-top:14px; flex-wrap:wrap}

  /* Cards */
  .cards{display:grid; gap:18px}
  .films .cards{grid-template-columns:1fr}
  .grid2{grid-template-columns:repeat(auto-fill,minmax(280px,1fr))}
  .card{
    background:var(--surface); border:1px solid var(--border); border-radius:16px;
    overflow:hidden; transition:.18s; position:relative;
  }
  .card:hover{border-color:#4d3a2b}
  .film{display:grid; grid-template-columns:150px 1fr; gap:0}
  .poster{aspect-ratio:2/3; background:var(--surface2); object-fit:cover; width:100%; height:100%}
  .poster.empty{display:flex; align-items:center; justify-content:center; color:var(--muted); font-family:var(--display); font-style:italic; font-size:14px}
  .film .body{padding:18px 20px}
  .row1{display:flex; align-items:flex-start; justify-content:space-between; gap:12px}
  .name{font-family:var(--display); font-size:25px; font-weight:600; margin:0; line-height:1.05}
  .year{color:var(--muted); font-size:14px; margin-left:8px; font-weight:400}
  .score{
    flex:none; font-family:var(--display); font-weight:600; font-size:22px; color:var(--gold);
    border:1px solid #4a3a22; background:#241b11; border-radius:10px; padding:4px 11px; line-height:1;
    display:flex; align-items:baseline; gap:2px;
  }
  .score small{font-size:12px; color:var(--muted); font-weight:400}
  .note{color:var(--text); opacity:.9; margin:10px 0 0; font-size:14.5px; white-space:pre-wrap}
  .edit-video{margin-top:14px}
  .edit-video video{width:100%; border-radius:12px; background:#000; display:block; border:1px solid var(--border)}
  .edit-label{font-size:11px; letter-spacing:.2em; text-transform:uppercase; color:var(--accent); margin:0 0 7px}
  .meta{color:var(--muted); font-size:13px; margin:8px 0 0}
  .links a{color:var(--accent-soft); text-decoration:none; border-bottom:1px solid transparent; transition:.15s; margin-right:14px; font-size:14px}
  .links a:hover{border-color:var(--accent-soft)}
  .cardActions{display:flex; gap:8px; margin-top:14px}
  .owner-only{display:none}
  body.owner .owner-only{display:flex}
  body.owner .panel{display:block}
  .panel{display:none}

  /* simple book/music card */
  .scard .body{padding:18px 20px}
  .empty-state{color:var(--muted); font-family:var(--display); font-style:italic; font-size:19px; padding:40px 4px; text-align:center}

  @media(max-width:560px){
    .film{grid-template-columns:110px 1fr}
    .name{font-size:21px}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <p class="eyebrow">личная коллекция</p>
    <h1 class="title" id="hTitle" spellcheck="false">Мой архив</h1>
    <p class="subtitle" id="hSub" spellcheck="false">Фильмы, музыка и книги, которые стоит запомнить.</p>
    <div class="ownerbar">
      <button class="lock" id="lockBtn">🔒 Только просмотр</button>
      <span class="hint" id="lockHint">Нажми, чтобы включить редактирование</span>
    </div>
  </header>

  <nav class="tabs" id="tabs">
    <button class="tab active" data-tab="films">Фильмы</button>
    <button class="tab" data-tab="music">Музыка</button>
    <button class="tab" data-tab="books">Книги</button>
  </nav>

  <!-- FILMS -->
  <section class="films" data-section="films">
    <div class="panel">
      <h3 id="filmFormTitle">Добавить фильм</h3>
      <div class="grid">
        <div><label>Название</label><input type="text" id="f_title"></div>
        <div><label>Год</label><input type="number" id="f_year" placeholder="2004"></div>
        <div><label>Оценка (0–10)</label><input type="number" id="f_score" min="0" max="10" step="0.1" placeholder="8.5"></div>
        <div class="full"><label>Постер (фото)</label><input type="file" id="f_poster" accept="image/*"></div>
        <div class="full"><label>Видео-эдит — ссылка или путь в репозитории (например edits/iz13v30.mp4)</label><input type="url" id="f_edit" placeholder="edits/iz13v30.mp4"></div>
        <div class="full"><label>Комментарий</label><textarea id="f_note"></textarea></div>
      </div>
      <div class="formActions">
        <button class="btn" id="f_save">Сохранить фильм</button>
        <button class="btn ghost" id="f_cancel" style="display:none">Отмена</button>
      </div>
    </div>
    <div class="cards" id="filmsList"></div>
  </section>

  <!-- MUSIC -->
  <section data-section="music" hidden>
    <div class="panel">
      <h3 id="musicFormTitle">Добавить трек</h3>
      <div class="grid">
        <div><label>Название</label><input type="text" id="m_title"></div>
        <div><label>Исполнитель</label><input type="text" id="m_artist"></div>
        <div><label>Оценка (0–10)</label><input type="number" id="m_score" min="0" max="10" step="0.1"></div>
        <div class="full"><label>Обложка (фото)</label><input type="file" id="m_cover" accept="image/*"></div>
        <div><label>Ссылка «Слушать»</label><input type="url" id="m_listen"></div>
        <div><label>Ссылка «Скачать»</label><input type="url" id="m_download"></div>
      </div>
      <div class="formActions">
        <button class="btn" id="m_save">Сохранить трек</button>
        <button class="btn ghost" id="m_cancel" style="display:none">Отмена</button>
      </div>
    </div>
    <div class="cards grid2" id="musicList"></div>
  </section>

  <!-- BOOKS -->
  <section data-section="books" hidden>
    <div class="panel">
      <h3 id="bookFormTitle">Добавить книгу</h3>
      <div class="grid">
        <div><label>Название</label><input type="text" id="b_title"></div>
        <div><label>Автор</label><input type="text" id="b_author"></div>
        <div><label>Оценка (0–10)</label><input type="number" id="b_score" min="0" max="10" step="0.1"></div>
        <div class="full"><label>Обложка (фото)</label><input type="file" id="b_cover" accept="image/*"></div>
        <div class="full"><label>Заметка</label><textarea id="b_note"></textarea></div>
      </div>
      <div class="formActions">
        <button class="btn" id="b_save">Сохранить книгу</button>
        <button class="btn ghost" id="b_cancel" style="display:none">Отмена</button>
      </div>
    </div>
    <div class="cards grid2" id="booksList"></div>
  </section>
</div>

<script>
const KEY='moy-arhiv-v2';
const PIN_KEY='moy-arhiv-pin';

// ---- default seed (runs only if storage is empty) ----
const SEED={
  meta:{title:'Мой архив', sub:'Фильмы, музыка и книги, которые стоит запомнить.'},
  films:[
    {id:id(), title:'Из 13 в 30', year:2004, score:8.5, poster:'', edit:'edits/iz13v30.mp4', note:'Эдит — тут.'},
    {id:id(), title:'Шерлок', year:2010, score:9, poster:'', edit:'', note:'Сюда перенести второй эдит — кнопкой «Редактировать».'}
  ],
  music:[],
  books:[]
};

function id(){return Math.random().toString(36).slice(2,9)+Date.now().toString(36)}

let state = load();
let editing = {films:null, music:null, books:null};

function load(){
  try{const raw=localStorage.getItem(KEY); if(raw) return JSON.parse(raw);}catch(e){}
  localStorage.setItem(KEY, JSON.stringify(SEED));
  return JSON.parse(JSON.stringify(SEED));
}
function save(){try{localStorage.setItem(KEY, JSON.stringify(state));}catch(e){alert('Не удалось сохранить: возможно, в памяти браузера кончилось место (часто из-за больших фото).');}}
function esc(s){return (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function fmtScore(s){if(s===''||s==null||isNaN(s))return null; const n=Number(s); return Number.isInteger(n)?String(n):n.toFixed(1)}

// ---- owner mode ----
function isOwner(){return document.body.classList.contains('owner')}
function setOwner(on){
  document.body.classList.toggle('owner',on);
  const b=document.getElementById('lockBtn'), h=document.getElementById('lockHint');
  if(on){b.textContent='🔓 Редактирование включено'; b.classList.add('on'); h.textContent='Видно только тебе на этом устройстве';}
  else{b.textContent='🔒 Только просмотр'; b.classList.remove('on'); h.textContent='Нажми, чтобы включить редактирование';}
}
document.getElementById('lockBtn').addEventListener('click',()=>{
  if(isOwner()){setOwner(false); return;}
  let pin=localStorage.getItem(PIN_KEY);
  if(!pin){
    const np=prompt('Придумай PIN-код владельца (он будет нужен, чтобы редактировать). Запомни его:');
    if(np===null||np==='')return;
    localStorage.setItem(PIN_KEY,np); setOwner(true); return;
  }
  const t=prompt('Введи PIN владельца:');
  if(t===pin) setOwner(true);
  else if(t!==null) alert('Неверный PIN.');
});

// ---- header editing ----
const hTitle=document.getElementById('hTitle'), hSub=document.getElementById('hSub');
function syncHeaderEditable(){const o=isOwner(); hTitle.contentEditable=o; hSub.contentEditable=o;}
hTitle.textContent=state.meta.title; hSub.textContent=state.meta.sub;
function saveHeader(){state.meta.title=hTitle.textContent.trim()||'Мой архив'; state.meta.sub=hSub.textContent.trim(); save();}
hTitle.addEventListener('blur',saveHeader); hSub.addEventListener('blur',saveHeader);

// ---- tabs ----
document.getElementById('tabs').addEventListener('click',e=>{
  const t=e.target.closest('.tab'); if(!t)return;
  document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('active',x===t));
  document.querySelectorAll('[data-section]').forEach(s=>s.hidden=s.dataset.section!==t.dataset.tab);
});

// ---- file -> base64 ----
function readImage(input){
  return new Promise(res=>{
    const f=input.files&&input.files[0]; if(!f){res(null);return;}
    const r=new FileReader(); r.onload=()=>res(r.result); r.onerror=()=>res(null); r.readAsDataURL(f);
  });
}

// ---- render ----
function render(){
  renderFilms(); renderSimple('music'); renderSimple('books');
}

function renderFilms(){
  const el=document.getElementById('filmsList');
  if(!state.films.length){el.innerHTML='<div class="empty-state">Пока пусто. Включи редактирование и добавь первый фильм.</div>'; return;}
  el.innerHTML=state.films.map(f=>{
    const sc=fmtScore(f.score);
    const poster=f.poster?`<img class="poster" src="${esc(f.poster)}" alt="">`:`<div class="poster empty">нет постера</div>`;
    const video=f.edit?`<div class="edit-video"><p class="edit-label">Эдит</p><video src="${esc(f.edit)}" controls preload="metadata"></video></div>`:'';
    return `<article class="card film">
      ${poster}
      <div class="body">
        <div class="row1">
          <h2 class="name">${esc(f.title)}${f.year?`<span class="year">${esc(f.year)}</span>`:''}</h2>
          ${sc?`<span class="score">${sc}<small>/10</small></span>`:''}
        </div>
        ${f.note?`<p class="note">${esc(f.note)}</p>`:''}
        ${video}
        <div class="cardActions owner-only">
          <button class="btn sm ghost" data-edit="films" data-id="${f.id}">Редактировать</button>
          <button class="btn sm danger" data-del="films" data-id="${f.id}">Удалить</button>
        </div>
      </div>
    </article>`;
  }).join('');
}

function renderSimple(type){
  const el=document.getElementById(type+'List');
  const arr=state[type];
  if(!arr.length){el.innerHTML=`<div class="empty-state" style="grid-column:1/-1">Пока пусто.</div>`; return;}
  el.innerHTML=arr.map(it=>{
    const sc=fmtScore(it.score);
    const cover=it.cover?`<img class="poster" style="aspect-ratio:3/4" src="${esc(it.cover)}" alt="">`:'';
    let sub='', links='';
    if(type==='music'){
      sub=it.artist?`<p class="meta">${esc(it.artist)}</p>`:'';
      const l=[]; if(it.listen)l.push(`<a href="${esc(it.listen)}" target="_blank" rel="noopener">Слушать</a>`);
      if(it.download)l.push(`<a href="${esc(it.download)}" target="_blank" rel="noopener">Скачать</a>`);
      links=l.length?`<p class="links">${l.join('')}</p>`:'';
    }else{
      sub=it.author?`<p class="meta">${esc(it.author)}</p>`:'';
      links=it.note?`<p class="note">${esc(it.note)}</p>`:'';
    }
    return `<article class="card scard">
      ${cover}
      <div class="body">
        <div class="row1">
          <h2 class="name">${esc(it.title)}</h2>
          ${sc?`<span class="score">${sc}<small>/10</small></span>`:''}
        </div>
        ${sub}${links}
        <div class="cardActions owner-only">
          <button class="btn sm ghost" data-edit="${type}" data-id="${it.id}">Редактировать</button>
          <button class="btn sm danger" data-del="${type}" data-id="${it.id}">Удалить</button>
        </div>
      </div>
    </article>`;
  }).join('');
}

// ---- delegated edit/delete ----
document.body.addEventListener('click',e=>{
  const ed=e.target.closest('[data-edit]'); const dl=e.target.closest('[data-del]');
  if(ed){startEdit(ed.dataset.edit, ed.dataset.id);}
  if(dl){
    if(confirm('Удалить запись?')){
      const t=dl.dataset.del; state[t]=state[t].filter(x=>x.id!==dl.dataset.id); save(); render();
    }
  }
});

// ---- films form ----
const F={title:'f_title',year:'f_year',score:'f_score',edit:'f_edit',note:'f_note'};
document.getElementById('f_save').addEventListener('click',async()=>{
  const t=document.getElementById('f_title').value.trim();
  if(!t){alert('Впиши название фильма.');return;}
  let poster=await readImage(document.getElementById('f_poster'));
  const data={
    title:t, year:document.getElementById('f_year').value.trim(),
    score:document.getElementById('f_score').value, edit:document.getElementById('f_edit').value.trim(),
    note:document.getElementById('f_note').value.trim()
  };
  if(editing.films){
    const it=state.films.find(x=>x.id===editing.films);
    Object.assign(it,data); if(poster)it.poster=poster;
    editing.films=null; document.getElementById('filmFormTitle').textContent='Добавить фильм';
    document.getElementById('f_save').textContent='Сохранить фильм'; document.getElementById('f_cancel').style.display='none';
  }else{
    state.films.unshift({id:id(),poster:poster||'',...data});
  }
  save(); render(); clearFilm();
});
document.getElementById('f_cancel').addEventListener('click',()=>{editing.films=null; clearFilm(); document.getElementById('filmFormTitle').textContent='Добавить фильм'; document.getElementById('f_save').textContent='Сохранить фильм'; document.getElementById('f_cancel').style.display='none';});
function clearFilm(){['f_title','f_year','f_score','f_edit','f_note','f_poster'].forEach(i=>document.getElementById(i).value='');}

// ---- music form ----
document.getElementById('m_save').addEventListener('click',async()=>{
  const t=document.getElementById('m_title').value.trim(); if(!t){alert('Впиши название трека.');return;}
  let cover=await readImage(document.getElementById('m_cover'));
  const data={title:t,artist:document.getElementById('m_artist').value.trim(),score:document.getElementById('m_score').value,
    listen:document.getElementById('m_listen').value.trim(),download:document.getElementById('m_download').value.trim()};
  if(editing.music){const it=state.music.find(x=>x.id===editing.music);Object.assign(it,data);if(cover)it.cover=cover;resetSimple('music');}
  else{state.music.unshift({id:id(),cover:cover||'',...data});}
  save();render();['m_title','m_artist','m_score','m_listen','m_download','m_cover'].forEach(i=>document.getElementById(i).value='');
});
document.getElementById('m_cancel').addEventListener('click',()=>{editing.music=null;resetSimple('music');['m_title','m_artist','m_score','m_listen','m_download','m_cover'].forEach(i=>document.getElementById(i).value='');});

// ---- books form ----
document.getElementById('b_save').addEventListener('click',async()=>{
  const t=document.getElementById('b_title').value.trim(); if(!t){alert('Впиши название книги.');return;}
  let cover=await readImage(document.getElementById('b_cover'));
  const data={title:t,author:document.getElementById('b_author').value.trim(),score:document.getElementById('b_score').value,note:document.getElementById('b_note').value.trim()};
  if(editing.books){const it=state.books.find(x=>x.id===editing.books);Object.assign(it,data);if(cover)it.cover=cover;resetSimple('books');}
  else{state.books.unshift({id:id(),cover:cover||'',...data});}
  save();render();['b_title','b_author','b_score','b_note','b_cover'].forEach(i=>document.getElementById(i).value='');
});
document.getElementById('b_cancel').addEventListener('click',()=>{editing.books=null;resetSimple('books');['b_title','b_author','b_score','b_note','b_cover'].forEach(i=>document.getElementById(i).value='');});

function resetSimple(type){
  const map={music:'musicFormTitle',books:'bookFormTitle'};
  document.getElementById(map[type]).textContent = type==='music'?'Добавить трек':'Добавить книгу';
  document.getElementById(type[0]+'_save').textContent = type==='music'?'Сохранить трек':'Сохранить книгу';
  document.getElementById(type[0]+'_cancel').style.display='none';
  editing[type]=null;
}

// ---- start edit (prefill form, scroll up) ----
function startEdit(type,recId){
  if(!isOwner()){alert('Сначала включи редактирование (замок сверху).');return;}
  const it=state[type].find(x=>x.id===recId); if(!it)return;
  // switch to the right tab
  document.querySelector(`.tab[data-tab="${type}"]`).click();
  editing[type]=recId;
  if(type==='films'){
    document.getElementById('f_title').value=it.title||''; document.getElementById('f_year').value=it.year||'';
    document.getElementById('f_score').value=it.score||''; document.getElementById('f_edit').value=it.edit||'';
    document.getElementById('f_note').value=it.note||'';
    document.getElementById('filmFormTitle').textContent='Редактировать фильм';
    document.getElementById('f_save').textContent='Сохранить изменения'; document.getElementById('f_cancel').style.display='inline-block';
  }else if(type==='music'){
    document.getElementById('m_title').value=it.title||''; document.getElementById('m_artist').value=it.artist||'';
    document.getElementById('m_score').value=it.score||''; document.getElementById('m_listen').value=it.listen||'';
    document.getElementById('m_download').value=it.download||'';
    document.getElementById('musicFormTitle').textContent='Редактировать трек';
    document.getElementById('m_save').textContent='Сохранить изменения'; document.getElementById('m_cancel').style.display='inline-block';
  }else{
    document.getElementById('b_title').value=it.title||''; document.getElementById('b_author').value=it.author||'';
    document.getElementById('b_score').value=it.score||''; document.getElementById('b_note').value=it.note||'';
    document.getElementById('bookFormTitle').textContent='Редактировать книгу';
    document.getElementById('b_save').textContent='Сохранить изменения'; document.getElementById('b_cancel').style.display='inline-block';
  }
  window.scrollTo({top:0,behavior:'smooth'});
}

// init
syncHeaderEditable();
new MutationObserver(syncHeaderEditable).observe(document.body,{attributes:true,attributeFilter:['class']});
render();
</script>
</body>
